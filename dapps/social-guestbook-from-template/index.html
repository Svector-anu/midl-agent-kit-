<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Guestbook</title>
    <meta name="description" content="A MIDL Bitcoin-native dApp" />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Buffer and global polyfills required by @midl/* packages in a browser environment.
      BigInt.toJSON is needed for JSON serialization of on-chain values.
      Must load before the main module.
    -->
    <script type="module">
      import { Buffer } from "buffer";
      window.Buffer = Buffer;
      window.global = window;
      BigInt.prototype.toJSON = function () {
        return this.toString();
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
